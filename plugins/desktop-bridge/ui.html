<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #2a2a2a;
      --bg-tertiary: #383838;
      --border-color: #4a4a4a;
      --text-primary: rgba(255, 255, 255, 0.95);
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.5);
      --accent: #18a957;
      --accent-hover: #1fc263;
      --error: #f24822;
      --warning: #f5a623;
      --info: #0d99ff;
      --tooltip-bg: #1a1a1a;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 11px;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      user-select: none;
      min-width: 280px;
      min-height: 350px;
    }

    /* Tooltip Styles */
    [data-tooltip] {
      position: relative;
    }

    [data-tooltip]::before,
    [data-tooltip]::after {
      position: absolute;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.15s ease, visibility 0.15s ease;
      z-index: 1000;
      pointer-events: none;
    }

    [data-tooltip]::before {
      content: attr(data-tooltip);
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--tooltip-bg);
      color: var(--text-primary);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 400;
      white-space: nowrap;
      max-width: 200px;
      white-space: normal;
      text-align: center;
      line-height: 1.4;
      border: 1px solid var(--border-color);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    [data-tooltip]::after {
      content: '';
      bottom: calc(100% + 1px);
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--tooltip-bg);
    }

    [data-tooltip]:hover::before,
    [data-tooltip]:hover::after {
      opacity: 1;
      visibility: visible;
    }

    /* Tooltip variations */
    [data-tooltip][data-tooltip-pos="left"]::before {
      bottom: auto;
      left: auto;
      right: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
    }

    [data-tooltip][data-tooltip-pos="left"]::after {
      bottom: auto;
      left: auto;
      right: calc(100% + 1px);
      top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-left-color: var(--tooltip-bg);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logo {
      font-weight: 600;
      font-size: 11px;
      color: var(--text-primary);
    }

    .version {
      font-size: 9px;
      color: var(--text-muted);
      background: var(--bg-tertiary);
      padding: 1px 4px;
      border-radius: 3px;
    }

    /* Connection Section */
    .connection-section {
      padding: 8px 10px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .connection-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .connection-row:last-child {
      margin-bottom: 0;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: help;
    }

    .status-indicator.loading {
      background: var(--warning);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-indicator.connected {
      background: var(--accent);
      box-shadow: 0 0 6px rgba(24, 169, 87, 0.6);
      animation: glow 2s ease-in-out infinite;
    }

    .status-indicator.error {
      background: var(--error);
    }

    .status-indicator.disconnected {
      background: var(--text-muted);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 4px rgba(24, 169, 87, 0.4); }
      50% { box-shadow: 0 0 8px rgba(24, 169, 87, 0.8); }
    }

    .status-label {
      color: var(--text-secondary);
      min-width: 45px;
      font-size: 10px;
    }

    .status-value {
      color: var(--text-primary);
      font-weight: 500;
      font-size: 10px;
    }

    .port-select {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 10px;
      cursor: pointer;
      transition: border-color 0.15s ease;
    }

    .port-select:hover {
      border-color: var(--accent);
    }

    .port-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 9px;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) {
      background: var(--border-color);
      border-color: var(--text-muted);
    }

    .btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-sm {
      padding: 3px 6px;
      font-size: 9px;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Actions Section */
    .actions-section {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .section-title {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .actions-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 6px 4px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 3px;
      color: var(--text-primary);
      font-size: 9px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .action-btn:hover:not(:disabled) {
      background: var(--bg-tertiary);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .action-btn:active:not(:disabled) {
      transform: translateY(0) scale(0.98);
    }

    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .action-btn .icon {
      font-size: 11px;
    }

    .action-btn.danger {
      border-color: rgba(242, 72, 34, 0.5);
      color: var(--error);
    }

    .action-btn.danger:hover:not(:disabled) {
      background: var(--error);
      border-color: var(--error);
      color: white;
    }

    /* Code Input Section */
    .code-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 80px;
      overflow: hidden;
    }

    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .code-input {
      flex: 1;
      width: 100%;
      background: var(--bg-primary);
      border: none;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', 'SF Mono', Monaco, monospace;
      font-size: 9px;
      padding: 6px 10px;
      resize: none;
      line-height: 1.5;
      min-height: 60px;
    }

    .code-input:focus {
      outline: none;
    }

    .code-input::placeholder {
      color: var(--text-muted);
    }

    /* Logs Section */
    .logs-section {
      height: 80px;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .logs-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .logs-content {
      flex: 1;
      overflow-y: auto;
      padding: 4px 10px;
      background: var(--bg-primary);
      font-family: 'JetBrains Mono', 'SF Mono', Monaco, monospace;
      font-size: 8px;
      line-height: 1.5;
    }

    .log-entry {
      display: flex;
      gap: 4px;
      margin-bottom: 1px;
    }

    .log-time {
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .log-message {
      color: var(--text-secondary);
      word-break: break-word;
    }

    .log-message.success {
      color: var(--accent);
    }

    .log-message.error {
      color: var(--error);
    }

    .log-message.info {
      color: var(--info);
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      font-size: 9px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 3px;
      cursor: help;
    }

    .stat-value {
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* Resize Handle */
    .resize-handle {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 14px;
      height: 14px;
      cursor: nwse-resize;
      background: linear-gradient(135deg, transparent 50%, var(--border-color) 50%, var(--border-color) 60%, transparent 60%, transparent 70%, var(--border-color) 70%, var(--border-color) 80%, transparent 80%);
      z-index: 100;
      transition: background 0.15s ease;
    }

    .resize-handle:hover {
      background: linear-gradient(135deg, transparent 50%, var(--accent) 50%, var(--accent) 60%, transparent 60%, transparent 70%, var(--accent) 70%, var(--accent) 80%, transparent 80%);
    }

    /* Size indicator during resize */
    .size-indicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg-secondary);
      border: 1px solid var(--accent);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 10px;
      color: var(--text-primary);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 1000;
    }

    .size-indicator.visible {
      opacity: 1;
    }

    /* Light theme */
    @media (prefers-color-scheme: light) {
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f5f5f5;
        --bg-tertiary: #ebebeb;
        --border-color: #e0e0e0;
        --text-primary: #1a1a1a;
        --text-secondary: #666666;
        --text-muted: #999999;
        --tooltip-bg: #333;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* Responsive adjustments */
    @media (max-width: 320px) {
      .actions-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .connection-row {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="logo">Desktop Bridge</span>
      <span class="version" data-tooltip="MCP Bridge Plugin Version">v1.4.0</span>
    </div>
    <div class="status-indicator disconnected" id="main-status" data-tooltip="Connection status: Green = Connected, Yellow = Connecting, Red = Error, Gray = Disconnected"></div>
  </div>

  <!-- Connection Section -->
  <div class="connection-section">
    <div class="connection-row">
      <span class="status-label">Status:</span>
      <span class="status-value" id="connection-status">Disconnected</span>
      <select class="port-select" id="port-select" data-tooltip="Select which port to connect to. Bridge server runs on 9223-9232">
        <option value="9223">:9223</option>
        <option value="9224">:9224</option>
        <option value="9225">:9225</option>
        <option value="9226">:9226</option>
        <option value="9227">:9227</option>
        <option value="9228">:9228</option>
        <option value="9229">:9229</option>
        <option value="9230">:9230</option>
        <option value="9231">:9231</option>
        <option value="9232">:9232</option>
      </select>
      <button class="btn btn-sm" id="scan-btn" data-tooltip="Scan ports 9223-9232 to find running MCP servers">Scan</button>
      <button class="btn btn-sm btn-primary" id="connect-btn" data-tooltip="Connect to the MCP bridge server to enable Figma API access">Connect</button>
    </div>
    <div class="connection-row">
      <span class="status-label">Server:</span>
      <span class="status-value" id="server-info" data-tooltip="Current server connection info">Not connected</span>
    </div>
  </div>

  <!-- Actions Section -->
  <div class="actions-section">
    <div class="section-title">Quick Actions</div>
    <div class="actions-grid">
      <button class="action-btn" id="btn-execute" disabled data-tooltip="Execute the code from the input area below in Figma's plugin sandbox">
        <span class="icon">▶</span>
        <span>Run Code</span>
      </button>
      <button class="action-btn" id="btn-refresh" disabled data-tooltip="Refresh and reload all Figma variables (colors, spacing, typography)">
        <span class="icon">↻</span>
        <span>Variables</span>
      </button>
      <button class="action-btn" id="btn-components" disabled data-tooltip="Get a list of all local components in the current Figma file">
        <span class="icon">◇</span>
        <span>Components</span>
      </button>
      <button class="action-btn" id="btn-screenshot" disabled data-tooltip="Capture a screenshot of the current Figma selection">
        <span class="icon">◉</span>
        <span>Screenshot</span>
      </button>
      <button class="action-btn" id="btn-clear" data-tooltip="Clear all activity log entries below">
        <span class="icon">⌫</span>
        <span>Clear Log</span>
      </button>
      <button class="action-btn danger" id="btn-disconnect" disabled data-tooltip="Disconnect from the MCP bridge server">
        <span class="icon">✕</span>
        <span>Disconnect</span>
      </button>
    </div>
  </div>

  <!-- Code Input Section -->
  <div class="code-section">
    <div class="code-header">
      <span class="section-title" data-tooltip="Enter Figma Plugin API JavaScript code here">Code Input</span>
      <button class="btn btn-sm btn-primary" id="btn-run-code" disabled data-tooltip="Execute the code in Figma (Ctrl/Cmd+Enter)">Run</button>
    </div>
    <textarea class="code-input" id="code-input" placeholder="// Figma Plugin API code
// Example:
const frame = figma.createFrame();
frame.name = 'My Frame';
frame.resize(200, 200);
figma.currentPage.appendChild(frame);
return { id: frame.id };"></textarea>
  </div>

  <!-- Logs Section -->
  <div class="logs-section">
    <div class="logs-header">
      <span class="section-title" data-tooltip="Activity log showing all operations and their results">Activity</span>
    </div>
    <div class="logs-content" id="logs-content"></div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item" data-tooltip="Number of design variables loaded from Figma">
      <span>Vars:</span>
      <span class="stat-value" id="stat-variables">0</span>
    </div>
    <div class="stat-item" data-tooltip="Total number of requests sent to Figma">
      <span>Reqs:</span>
      <span class="stat-value" id="stat-requests">0</span>
    </div>
    <div class="stat-item" data-tooltip="Time since connection was established">
      <span>Up:</span>
      <span class="stat-value" id="stat-uptime">--</span>
    </div>
    <div class="stat-item" data-tooltip="Current plugin window size (drag corner to resize)" id="size-display">
      <span>Size:</span>
      <span class="stat-value" id="stat-size">400×500</span>
    </div>
  </div>

  <!-- Resize Handle -->
  <div class="resize-handle" id="resize-handle" data-tooltip="Drag to resize the plugin window" data-tooltip-pos="left"></div>

  <!-- Size Indicator -->
  <div class="size-indicator" id="size-indicator">400 × 500</div>

  <script>
    // ============================================================================
    // GLOBAL STATE
    // ============================================================================
    window.__figmaVariablesData = null;
    window.__figmaVariablesReady = false;
    window.__figmaComponentData = null;
    window.__figmaComponentRequests = new Map();
    window.__figmaPendingRequests = new Map();

    let requestIdCounter = 0;
    let connectedPort = null;
    let connectionStartTime = null;
    let requestCount = 0;

    const WS_PORT_RANGE_START = 9223;
    const WS_PORT_RANGE_END = 9232;
    let activeConnections = [];

    // ============================================================================
    // LOGGING
    // ============================================================================
    function log(message, type) {
      type = type || 'info';
      const logsContent = document.getElementById('logs-content');
      const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

      const entry = document.createElement('div');
      entry.className = 'log-entry';
      var msgClass = 'log-message';
      if (type === 'success') msgClass += ' success';
      else if (type === 'error') msgClass += ' error';
      else if (type === 'info') msgClass += ' info';

      entry.innerHTML = '<span class="log-time">' + time + '</span><span class="' + msgClass + '">' + escapeHtml(message) + '</span>';

      logsContent.appendChild(entry);
      logsContent.scrollTop = logsContent.scrollHeight;

      while (logsContent.children.length > 100) {
        logsContent.removeChild(logsContent.firstChild);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function clearLogs() {
      document.getElementById('logs-content').innerHTML = '';
      log('Logs cleared', 'info');
    }

    // ============================================================================
    // UI UPDATES
    // ============================================================================
    function updateConnectionUI(state, port) {
      port = port || null;
      const mainStatus = document.getElementById('main-status');
      const connectionStatus = document.getElementById('connection-status');
      const serverInfo = document.getElementById('server-info');
      const connectBtn = document.getElementById('connect-btn');
      const disconnectBtn = document.getElementById('btn-disconnect');
      const actionBtns = document.querySelectorAll('.action-btn:not(#btn-clear):not(#btn-disconnect)');
      const runCodeBtn = document.getElementById('btn-run-code');

      mainStatus.className = 'status-indicator ' + state;
      connectedPort = port;

      if (state === 'connected') {
        connectionStatus.textContent = 'Connected';
        serverInfo.textContent = 'localhost:' + port;
        connectBtn.textContent = 'Connected';
        connectBtn.disabled = true;
        disconnectBtn.disabled = false;
        for (var i = 0; i < actionBtns.length; i++) actionBtns[i].disabled = false;
        runCodeBtn.disabled = false;
        connectionStartTime = Date.now();
        updateUptime();
      } else if (state === 'loading') {
        connectionStatus.textContent = 'Connecting...';
        serverInfo.textContent = 'scanning...';
        connectBtn.textContent = '...';
        connectBtn.disabled = true;
      } else if (state === 'error') {
        connectionStatus.textContent = 'Error';
        serverInfo.textContent = 'Connection failed';
        connectBtn.textContent = 'Retry';
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
        for (var i = 0; i < actionBtns.length; i++) actionBtns[i].disabled = true;
        runCodeBtn.disabled = true;
      } else {
        connectionStatus.textContent = 'Disconnected';
        serverInfo.textContent = 'Not connected';
        connectBtn.textContent = 'Connect';
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
        for (var i = 0; i < actionBtns.length; i++) actionBtns[i].disabled = true;
        runCodeBtn.disabled = true;
        connectionStartTime = null;
      }
    }

    function updateStats() {
      var varCount = 0;
      if (window.__figmaVariablesData && window.__figmaVariablesData.variables) {
        varCount = window.__figmaVariablesData.variables.length;
      }
      document.getElementById('stat-variables').textContent = varCount;
      document.getElementById('stat-requests').textContent = requestCount;
    }

    function updateUptime() {
      if (connectionStartTime) {
        const elapsed = Math.floor((Date.now() - connectionStartTime) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        document.getElementById('stat-uptime').textContent = mins > 0 ? mins + 'm' + secs + 's' : secs + 's';
      }
    }

    function updateSizeDisplay(width, height) {
      document.getElementById('stat-size').textContent = width + '×' + height;
      document.getElementById('size-indicator').textContent = width + ' × ' + height;
    }

    setInterval(updateUptime, 1000);

    // ============================================================================
    // RESIZE FUNCTIONALITY
    // ============================================================================
    const resizeHandle = document.getElementById('resize-handle');
    const sizeIndicator = document.getElementById('size-indicator');
    let isResizing = false;
    let startX, startY, startWidth, startHeight;

    resizeHandle.addEventListener('mousedown', function(e) {
      isResizing = true;
      startX = e.clientX;
      startY = e.clientY;
      startWidth = document.body.offsetWidth;
      startHeight = document.body.offsetHeight;
      sizeIndicator.classList.add('visible');
      e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
      if (!isResizing) return;

      const deltaX = e.clientX - startX;
      const deltaY = e.clientY - startY;

      const newWidth = Math.max(280, Math.min(800, startWidth + deltaX));
      const newHeight = Math.max(350, Math.min(800, startHeight + deltaY));

      updateSizeDisplay(newWidth, newHeight);
    });

    document.addEventListener('mouseup', function(e) {
      if (!isResizing) return;
      isResizing = false;
      sizeIndicator.classList.remove('visible');

      const deltaX = e.clientX - startX;
      const deltaY = e.clientY - startY;

      const newWidth = Math.max(280, Math.min(800, startWidth + deltaX));
      const newHeight = Math.max(350, Math.min(800, startHeight + deltaY));

      sendPluginCommand('RESIZE_UI', { width: newWidth, height: newHeight });
      log('Resizing to ' + newWidth + '×' + newHeight, 'info');
    });

    // ============================================================================
    // WEBSOCKET CONNECTION
    // ============================================================================
    function wsScanAndConnect() {
      const preferredPort = parseInt(document.getElementById('port-select').value, 10);
      log('Scanning ports ' + WS_PORT_RANGE_START + '-' + WS_PORT_RANGE_END + '...', 'info');
      updateConnectionUI('loading');

      let foundPorts = [];

      function tryPort(port) {
        return new Promise(function(resolve) {
          const ws = new WebSocket('ws://localhost:' + port);

          const timeout = setTimeout(function() {
            ws.close();
            resolve(null);
          }, 500);

          ws.onopen = function() {
            clearTimeout(timeout);
            resolve({ ws: ws, port: port });
          };

          ws.onerror = function() {
            clearTimeout(timeout);
            resolve(null);
          };
        });
      }

      async function scan() {
        var result = await tryPort(preferredPort);
        if (result) {
          foundPorts.push(result);
        } else {
          for (var p = WS_PORT_RANGE_START; p <= WS_PORT_RANGE_END; p++) {
            if (p !== preferredPort) {
              result = await tryPort(p);
              if (result) foundPorts.push(result);
            }
          }
        }

        if (foundPorts.length > 0) {
          var conn = foundPorts[0];
          log('✓ Connected to localhost:' + conn.port, 'success');
          attachWsHandlers(conn.ws, conn.port);
          updateConnectionUI('connected', conn.port);

          // Request variables on connect
          setTimeout(function() {
            sendPluginCommand('REFRESH_VARIABLES', {});
          }, 500);
        } else {
          log('✗ No server found. Run: python bridge_server.py', 'error');
          updateConnectionUI('error');
        }
      }

      scan();
    }

    function attachWsHandlers(ws, port) {
      ws.onmessage = function(event) {
        try {
          const message = JSON.parse(event.data);
          handleWsMessage(message, port);
        } catch (e) {
          log('Parse error: ' + e.message, 'error');
        }
      };

      ws.onclose = function() {
        log('✗ Disconnected from :' + port, 'error');
        updateConnectionUI('disconnected');
        activeConnections = activeConnections.filter(function(c) { return c.port !== port; });
      };

      ws.onerror = function(err) {
        log('✗ WebSocket error on :' + port, 'error');
      };

      activeConnections.push({ ws: ws, port: port });
    }

    function handleWsMessage(message, port) {
      if (message.type === 'VARIABLES_DATA') {
        window.__figmaVariablesData = message.data;
        window.__figmaVariablesReady = true;
        updateStats();
        var count = 0;
        if (message.data && message.data.variables) count = message.data.variables.length;
        log('✓ Loaded ' + count + ' design variables', 'success');
      } else if (message.method === 'EXECUTE_CODE') {
        // Incoming execute request from bridge server - forward to plugin sandbox
        var code = message.params && message.params.code;
        var timeout = (message.params && message.params.timeout) || 30000;
        var requestId = message.id;

        if (!code) {
          sendWsResponse(requestId, null, 'Missing code parameter');
          return;
        }

        log('→ Executing code from server (' + code.length + ' bytes)', 'info');

        // Forward to plugin sandbox
        sendPluginCommand('EXECUTE_CODE', { code: code, requestId: requestId }, timeout)
          .then(function(result) {
            sendWsResponse(requestId, result, null);
            log('✓ Code execution completed', 'success');
          })
          .catch(function(err) {
            sendWsResponse(requestId, null, err.message);
            log('✗ Code execution failed: ' + err.message, 'error');
          });
      } else if (message.id && !message.method) {
        // Response to our request
        const request = window.__figmaPendingRequests.get(message.id);
        if (request) {
          if (request.timeoutId) clearTimeout(request.timeoutId);
          if (message.error) {
            request.reject(new Error(message.error));
            log('✗ ' + request.type + ': ' + message.error, 'error');
          } else {
            request.resolve(message.result || message);
            log('✓ ' + request.type + ' completed', 'success');
          }
          window.__figmaPendingRequests.delete(message.id);
        }
      }
    }

    function sendWsResponse(requestId, result, error) {
      if (activeConnections.length === 0) return;

      var response = { id: requestId };
      if (error) {
        response.error = error;
      } else {
        response.result = result;
      }

      activeConnections[0].ws.send(JSON.stringify(response));
    }

    function sendToWs(method, params) {
      params = params || {};
      return new Promise(function(resolve, reject) {
        if (activeConnections.length === 0) {
          reject(new Error('Not connected'));
          return;
        }

        const id = 'req_' + (++requestIdCounter) + '_' + Date.now();
        const timeout = setTimeout(function() {
          window.__figmaPendingRequests.delete(id);
          reject(new Error('Request timed out after 30s'));
        }, 30000);

        window.__figmaPendingRequests.set(id, { resolve: resolve, reject: reject, timeoutId: timeout, type: method });

        const message = { id: id, method: method, params: params };
        activeConnections[0].ws.send(JSON.stringify(message));
        requestCount++;
        updateStats();
        log('→ ' + method, 'info');
      });
    }

    // ============================================================================
    // PLUGIN COMMAND INFRASTRUCTURE
    // ============================================================================
    window.sendPluginCommand = function(type, params, timeoutMs) {
      timeoutMs = timeoutMs || 30000;
      return new Promise(function(resolve, reject) {
        const requestId = type.toLowerCase() + '_' + (++requestIdCounter) + '_' + Date.now();

        const timeoutId = setTimeout(function() {
          if (window.__figmaPendingRequests.has(requestId)) {
            window.__figmaPendingRequests.delete(requestId);
            reject(new Error(type + ' timed out'));
          }
        }, timeoutMs);

        window.__figmaPendingRequests.set(requestId, { resolve: resolve, reject: reject, type: type, timeoutId: timeoutId });

        var message = { type: type, requestId: requestId };
        for (var key in params) {
          if (params.hasOwnProperty(key)) {
            message[key] = params[key];
          }
        }

        parent.postMessage({ pluginMessage: message }, '*');
        requestCount++;
        updateStats();
      });
    };

    // ============================================================================
    // COMMAND WRAPPERS
    // ============================================================================
    window.executeCode = function(code, timeout) {
      return sendToWs('EXECUTE_CODE', { code: code, timeout: timeout || 60000 });
    };

    window.refreshVariables = function() {
      return sendPluginCommand('REFRESH_VARIABLES', {});
    };

    window.getLocalComponents = function() {
      return sendPluginCommand('GET_LOCAL_COMPONENTS', {});
    };

    window.captureScreenshot = function() {
      return sendPluginCommand('CAPTURE_SCREENSHOT', {});
    };

    // ============================================================================
    // EVENT HANDLERS
    // ============================================================================
    document.getElementById('connect-btn').addEventListener('click', wsScanAndConnect);
    document.getElementById('scan-btn').addEventListener('click', wsScanAndConnect);

    document.getElementById('btn-disconnect').addEventListener('click', function() {
      activeConnections.forEach(function(c) {
        try { c.ws.close(); } catch (e) {}
      });
      activeConnections = [];
      updateConnectionUI('disconnected');
      log('Disconnected from server', 'info');
    });

    document.getElementById('btn-execute').addEventListener('click', function() {
      const code = document.getElementById('code-input').value.trim();
      if (code) {
        log('Executing code...', 'info');
        executeCode(code).then(function(result) {
          var preview = JSON.stringify(result, null, 2);
          if (preview.length > 200) preview = preview.substring(0, 200) + '...';
          log('✓ Result:\n' + preview, 'success');
        }).catch(function(err) {
          log('✗ Error: ' + err.message, 'error');
        });
      } else {
        log('⚠ Enter code in the input area first', 'error');
      }
    });

    document.getElementById('btn-refresh').addEventListener('click', function() {
      log('Refreshing variables...', 'info');
      refreshVariables().then(function(result) {
        log('✓ Variables refreshed', 'success');
      }).catch(function(err) {
        log('✗ Refresh failed: ' + err.message, 'error');
      });
    });

    document.getElementById('btn-components').addEventListener('click', function() {
      log('Fetching components...', 'info');
      getLocalComponents().then(function(result) {
        var count = 0;
        if (result && result.components) count = result.components.length;
        log('✓ Found ' + count + ' local components', 'success');
      }).catch(function(err) {
        log('✗ Failed: ' + err.message, 'error');
      });
    });

    document.getElementById('btn-screenshot').addEventListener('click', function() {
      log('Capturing screenshot...', 'info');
      captureScreenshot().then(function(result) {
        log('✓ Screenshot captured (' + (result.image ? result.image.length : 0) + ' bytes)', 'success');
      }).catch(function(err) {
        log('✗ Screenshot failed: ' + err.message, 'error');
      });
    });

    document.getElementById('btn-clear').addEventListener('click', clearLogs);

    document.getElementById('btn-run-code').addEventListener('click', function() {
      document.getElementById('btn-execute').click();
    });

    // Keyboard shortcut for running code
    document.addEventListener('keydown', function(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        const code = document.getElementById('code-input').value.trim();
        if (code && activeConnections.length > 0) {
          document.getElementById('btn-execute').click();
          e.preventDefault();
        }
      }
    });

    // ============================================================================
    // MESSAGE HANDLER
    // ============================================================================
    window.onmessage = function(event) {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      const handleResult = function(resultType, dataKey) {
        const request = window.__figmaPendingRequests.get(msg.requestId);
        if (request) {
          if (request.timeoutId) clearTimeout(request.timeoutId);
          if (msg.success) {
            var result = { success: true };
            if (dataKey && msg[dataKey] !== undefined) result[dataKey] = msg[dataKey];
            if (msg.data !== undefined) result.data = msg.data;
            request.resolve(result);
          } else {
            request.reject(new Error(msg.error || 'Unknown error'));
          }
          window.__figmaPendingRequests.delete(msg.requestId);
        }
      };

      if (msg.type === 'VARIABLES_DATA') {
        window.__figmaVariablesData = msg.data;
        window.__figmaVariablesReady = true;
        updateStats();
        var count = 0;
        if (msg.data && msg.data.variables) count = msg.data.variables.length;
        log('✓ Loaded ' + count + ' design variables', 'success');
      } else if (msg.type === 'EXECUTE_CODE_RESULT') {
        handleResult('Execute Code', 'result');
      } else if (msg.type === 'REFRESH_VARIABLES_RESULT') {
        handleResult('Refresh Variables', null);
      } else if (msg.type === 'GET_LOCAL_COMPONENTS_RESULT') {
        handleResult('Get Components', null);
      } else if (msg.type === 'CAPTURE_SCREENSHOT_RESULT') {
        handleResult('Screenshot', 'image');
      } else if (msg.type === 'RESIZE_UI_RESULT') {
        if (msg.success) {
          log('✓ Window resized to ' + msg.width + '×' + msg.height, 'success');
        } else {
          log('✗ Resize failed: ' + msg.error, 'error');
        }
      } else if (msg.type === 'ERROR') {
        log('✗ Plugin error: ' + msg.error, 'error');
      }
    };

    // ============================================================================
    // INITIALIZATION
    // ============================================================================
    log('🚀 Desktop Bridge v1.4.0 initialized', 'info');
    log('💡 Click "Connect" to find and connect to MCP server', 'info');
    updateStats();
    updateSizeDisplay(400, 500);
  </script>
</body>
</html>
